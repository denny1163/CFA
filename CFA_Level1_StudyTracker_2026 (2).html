<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFA Level I · Study Tracker 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070710;
  --bg2: #0d0d1a;
  --bg3: #12121f;
  --surface: #17172a;
  --surface2: #1e1e35;
  --border: #2a2a45;
  --border-bright: #3a3a60;
  --gold: #c9a84c;
  --gold-dim: #9a7a32;
  --gold-light: #e8c97a;
  --teal: #4ecdc4;
  --rose: #e87070;
  --green: #5cb85c;
  --text: #e8e8f0;
  --text-dim: #9090b0;
  --text-faint: #5a5a7a;
  --radius: 10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
.site-header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(7,7,16,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
}
.header-inner {
  max-width: 1600px; margin: 0 auto;
  display: flex; align-items: center; gap: 24px;
  height: 64px;
}
.logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.25rem; font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.logo span { color: var(--text-dim); font-weight: 400; }

.header-stats {
  display: flex; gap: 20px; margin-left: auto;
}
.stat-pill {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 14px;
  font-size: 0.78rem;
}
.stat-pill .label { color: var(--text-faint); }
.stat-pill .val { color: var(--gold); font-weight: 600; font-family: 'JetBrains Mono', monospace; }

.global-progress {
  height: 3px; background: var(--bg3);
  position: relative;
}
.global-progress-bar {
  height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light));
  transition: width 0.4s ease;
  box-shadow: 0 0 10px rgba(201,168,76,0.4);
}

/* ── LAYOUT ── */
.app-layout {
  display: flex; flex: 1;
  max-width: 1600px; margin: 0 auto; width: 100%;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 260px; min-width: 260px;
  position: sticky; top: 67px;
  height: calc(100vh - 67px);
  overflow-y: auto;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 20px 0;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

.sb-section { margin-bottom: 4px; }
.sb-subject {
  padding: 8px 20px;
  font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--gold); font-weight: 600;
  margin-top: 12px;
}
.sb-link {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 20px;
  font-size: 0.8rem; color: var(--text-dim);
  cursor: pointer; transition: all 0.15s;
  border-left: 2px solid transparent;
  text-decoration: none;
}
.sb-link:hover { color: var(--text); background: var(--surface); }
.sb-link.active { color: var(--gold-light); border-left-color: var(--gold); background: rgba(201,168,76,0.06); }
.sb-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; color: var(--text-faint);
  min-width: 22px;
}
.sb-progress-ring { margin-left: auto; }
.mini-ring {
  width: 20px; height: 20px;
}

/* ── MAIN CONTENT ── */
.main-content {
  flex: 1; padding: 32px 36px;
  overflow: auto;
}

.subject-section {
  margin-bottom: 56px;
}
.subject-header {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 24px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.subject-tag {
  font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--bg); background: var(--gold);
  padding: 3px 10px; border-radius: 4px; font-weight: 700;
}
.subject-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem; font-weight: 600;
  color: var(--text);
}
.subject-count {
  margin-left: auto;
  font-size: 0.78rem; color: var(--text-faint);
  font-family: 'JetBrains Mono', monospace;
}
.subject-prog-text {
  font-size: 0.78rem; color: var(--gold);
  font-family: 'JetBrains Mono', monospace;
}

/* ── CHAPTER CARD ── */
.chapter-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.chapter-card:hover { border-color: var(--border-bright); }
.chapter-card.expanded { border-color: var(--gold-dim); }

.chapter-header {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
}
.chapter-header:hover { background: var(--surface2); }

.ch-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; color: var(--gold);
  background: rgba(201,168,76,0.1);
  border: 1px solid rgba(201,168,76,0.2);
  padding: 3px 8px; border-radius: 5px;
  white-space: nowrap;
}
.ch-title {
  font-size: 0.95rem; font-weight: 500; color: var(--text);
  flex: 1; line-height: 1.4;
}
.ch-los-count {
  font-size: 0.72rem; color: var(--text-faint);
  font-family: 'JetBrains Mono', monospace;
  white-space: nowrap;
}
.ch-completion {
  font-size: 0.72rem; font-family: 'JetBrains Mono', monospace;
  padding: 3px 10px; border-radius: 12px;
  white-space: nowrap;
}
.ch-completion.done { background: rgba(92,184,92,0.12); color: var(--green); border: 1px solid rgba(92,184,92,0.2); }
.ch-completion.partial { background: rgba(201,168,76,0.1); color: var(--gold); border: 1px solid rgba(201,168,76,0.2); }
.ch-completion.none { background: var(--bg3); color: var(--text-faint); border: 1px solid var(--border); }

.ch-chevron {
  color: var(--text-faint); font-size: 0.85rem;
  transition: transform 0.25s; margin-left: 4px;
}
.chapter-card.expanded .ch-chevron { transform: rotate(180deg); }

/* ── CHAPTER BODY ── */
.chapter-body {
  display: none;
  padding: 0 20px 20px;
  border-top: 1px solid var(--border);
}
.chapter-card.expanded .chapter-body { display: block; }

/* LOS list */
.los-section {
  margin-top: 18px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 20px;
}
.los-section-title {
  font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-faint); font-weight: 600; margin-bottom: 10px;
}
.los-item {
  display: flex; gap: 10px;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 0.82rem; line-height: 1.5; color: var(--text-dim);
}
.los-item:last-child { border-bottom: none; }
.los-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; color: var(--gold);
  min-width: 36px; padding-top: 1px;
}

/* Checklist grid */
.checklist-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 14px;
}
.checklist-group {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px 16px;
}
.cg-label {
  font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-faint); font-weight: 600; margin-bottom: 10px;
}
.check-item {
  display: flex; align-items: center; gap: 10px;
  padding: 5px 0;
}
.check-item label { font-size: 0.83rem; color: var(--text-dim); cursor: pointer; }
.check-item input[type="checkbox"] {
  appearance: none; -webkit-appearance: none;
  width: 16px; height: 16px; border-radius: 4px;
  border: 1.5px solid var(--border-bright);
  background: var(--bg3); cursor: pointer;
  position: relative; flex-shrink: 0;
  transition: all 0.15s;
}
.check-item input[type="checkbox"]:checked {
  background: var(--gold); border-color: var(--gold);
}
.check-item input[type="checkbox"]:checked::after {
  content: '✓';
  position: absolute; top: -2px; left: 2px;
  font-size: 11px; color: var(--bg); font-weight: 700;
}

/* Controls row */
.controls-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 14px;
  margin-bottom: 14px;
}
.ctrl-group {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px 16px;
}
.ctrl-label {
  font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-faint); font-weight: 600; margin-bottom: 10px;
  display: block;
}
select, input[type="date"] {
  width: 100%;
  background: var(--bg2); border: 1px solid var(--border-bright);
  color: var(--text); border-radius: 6px;
  padding: 8px 10px; font-size: 0.82rem;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer; outline: none;
  transition: border-color 0.15s;
  appearance: none;
}
select:focus, input[type="date"]:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 2px rgba(201,168,76,0.15);
}
input[type="date"]::-webkit-calendar-picker-indicator {
  filter: invert(0.6);
  cursor: pointer;
}

.rev-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  margin-bottom: 14px;
}
.rev-group {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px 16px;
}
.rev-inner { display: flex; flex-direction: column; gap: 10px; }
.rev-date-row { display: flex; gap: 8px; align-items: center; }
.rev-date-row input[type="date"] { flex: 1; }
.status-toggle {
  display: flex; gap: 6px;
}
.status-btn {
  flex: 1; padding: 7px 10px;
  border-radius: 6px; border: 1.5px solid var(--border-bright);
  background: var(--bg2); color: var(--text-dim);
  font-size: 0.75rem; cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: all 0.15s; text-align: center; font-weight: 500;
}
.status-btn.active-done { background: rgba(92,184,92,0.15); border-color: var(--green); color: var(--green); }
.status-btn.active-pending { background: rgba(232,112,112,0.12); border-color: var(--rose); color: var(--rose); }

/* Confidence stars */
.confidence-stars { display: flex; gap: 4px; margin-top: 4px; }
.star-btn {
  font-size: 1.1rem; cursor: pointer;
  filter: grayscale(1) brightness(0.5);
  transition: filter 0.15s, transform 0.1s;
  border: none; background: none; padding: 2px;
}
.star-btn:hover { transform: scale(1.2); }
.star-btn.lit { filter: none; }
.confidence-label {
  font-size: 0.72rem; color: var(--text-faint);
  margin-top: 4px;
}
.conf-labels { display: flex; justify-content: space-between; }
.conf-labels span { font-size: 0.65rem; color: var(--text-faint); }

/* Scrollbar global */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }

/* Progress bar in chapter header */
.ch-prog-bar {
  width: 60px; height: 4px;
  background: var(--bg3); border-radius: 2px; overflow: hidden;
}
.ch-prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold));
  transition: width 0.3s ease;
}

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--surface); border: 1px solid var(--gold-dim);
  color: var(--gold-light); padding: 10px 18px;
  border-radius: 8px; font-size: 0.82rem;
  opacity: 0; transform: translateY(10px);
  transition: all 0.3s; pointer-events: none;
  z-index: 9999;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.toast.show { opacity: 1; transform: translateY(0); }

/* Notes */
.notes-group {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px 16px;
  margin-bottom: 0;
}
.notes-group:focus-within {
  border-color: var(--gold-dim);
}
.notes-textarea {
  width: 100%; min-height: 72px;
  background: transparent; border: none; outline: none;
  color: var(--text-dim); font-family: 'DM Sans', sans-serif;
  font-size: 0.83rem; line-height: 1.6; resize: vertical;
  margin-top: 6px;
}
.notes-textarea::placeholder { color: var(--text-faint); }
.notes-char { font-size: 0.65rem; color: var(--text-faint); text-align: right; margin-top: 4px; }

/* Animations */
@keyframes fadeIn { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: none; } }
.subject-section { animation: fadeIn 0.5s ease both; }
</style>
</head>

// ══════════════════════════════════════════════════
// STATE MANAGEMENT (localStorage)
// ══════════════════════════════════════════════════
const STORAGE_KEY = 'cfa_level1_tracker_2026';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

function getReadingState(state, readingId) {
  if (!state[readingId]) state[readingId] = {
    lectures: false, reading: false,
    qBooks: false, qOfficial: false, qOther: false,
    confidence: 0,
    rev1Date: '', rev1Status: '',
    rev2Date: '', rev2Status: '',
    notes: ''
  };
  return state[readingId];
}

let APP_STATE = loadState();

function persist() {
  saveState(APP_STATE);
  showToast();
  updateGlobalStats();
  updateAllSidebarRings();
}

// ══════════════════════════════════════════════════
// PROGRESS CALCULATIONS
// ══════════════════════════════════════════════════
function getReadingScore(rId) {
  const s = APP_STATE[rId];
  if (!s) return 0;
  let score = 0;
  if (s.lectures) score++;
  if (s.reading) score++;
  if (s.qBooks || s.qOfficial || s.qOther) score++;
  if (s.confidence >= 3) score++;
  if (s.rev1Status === 'done') score++;
  return score;
}
const MAX_SCORE = 5;

function getSubjectProgress(subject) {
  const ids = subject.readings.map(r => r.id);
  const total = ids.length * MAX_SCORE;
  const done = ids.reduce((acc, id) => acc + getReadingScore(id), 0);
  return { pct: total > 0 ? Math.round((done/total)*100) : 0, done, total };
}

function getReadingCompletion(rId) {
  const sc = getReadingScore(rId);
  if (sc === 0) return 'none';
  if (sc >= MAX_SCORE) return 'done';
  return 'partial';
}

function getChapterCompletionLabel(rId) {
  const sc = getReadingScore(rId);
  if (sc === 0) return { cls: 'none', label: '—' };
  if (sc >= MAX_SCORE) return { cls: 'done', label: '✓ Complete' };
  return { cls: 'partial', label: `${sc}/${MAX_SCORE} done` };
}

function getGlobalStats() {
  let done = 0, total = 0;
  CURRICULUM.forEach(subj => {
    subj.readings.forEach(r => {
      total += MAX_SCORE;
      done += getReadingScore(r.id);
    });
  });
  return { done, total, pct: total > 0 ? Math.round((done/total)*100) : 0 };
}

function updateGlobalStats() {
  const { done, total, pct } = getGlobalStats();
  document.getElementById('globalDone').textContent = `${done}/${total}`;
  document.getElementById('globalPct').textContent = pct + '%';
  document.getElementById('globalBar').style.width = pct + '%';
}

// ══════════════════════════════════════════════════
// SIDEBAR RENDER
// ══════════════════════════════════════════════════
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  CURRICULUM.forEach(subj => {
    const sec = document.createElement('div');
    sec.className = 'sb-section';
    const label = document.createElement('div');
    label.className = 'sb-subject';
    label.textContent = subj.subject;
    sec.appendChild(label);
    const { pct } = getSubjectProgress(subj);
    subj.readings.forEach(r => {
      const link = document.createElement('div');
      link.className = 'sb-link';
      link.id = `sb-${r.id}`;
      link.innerHTML = `
        <span class="sb-num">${String(r.id).padStart(2,'0')}</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.title}">${r.title}</span>
        <svg class="mini-ring" viewBox="0 0 20 20">
          <circle cx="10" cy="10" r="7" fill="none" stroke="var(--border)" stroke-width="2"/>
          <circle cx="10" cy="10" r="7" fill="none" stroke="var(--gold)" stroke-width="2"
            stroke-dasharray="${2*Math.PI*7}" stroke-dashoffset="${2*Math.PI*7*(1-(getReadingScore(r.id)/MAX_SCORE))}"
            stroke-linecap="round" transform="rotate(-90 10 10)"
            id="sb-ring-${r.id}"/>
        </svg>`;
      link.addEventListener('click', () => {
        const el = document.getElementById(`ch-${r.id}`);
        if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
      });
      sec.appendChild(link);
    });
    sb.appendChild(sec);
  });
}

function updateAllSidebarRings() {
  CURRICULUM.forEach(subj => {
    subj.readings.forEach(r => {
      const ring = document.getElementById(`sb-ring-${r.id}`);
      if (ring) {
        const pct = getReadingScore(r.id) / MAX_SCORE;
        ring.setAttribute('stroke-dashoffset', 2*Math.PI*7*(1-pct));
      }
    });
  });
}

// ══════════════════════════════════════════════════
// CHAPTER RENDER
// ══════════════════════════════════════════════════
function renderChapterCard(r) {

  card.id = `ch-${r.id}`;

  card.innerHTML = `
    <div class="chapter-header" onclick="toggleCard(${r.id})">
      <span class="ch-num">R${String(r.id).padStart(2,'0')}</span>
      <span class="ch-title">${r.title}</span>
      <span class="ch-los-count">${r.los.length} LOS</span>
      <div class="ch-prog-bar"><div class="ch-prog-fill" id="chpf-${r.id}" style="width:${progPct}%"></div></div>
      <span class="ch-completion ${comp.cls}" id="chcomp-${r.id}">${comp.label}</span>
      <span class="ch-chevron">▾</span>
    </div>
    <div class="chapter-body">
      <div class="los-section">
        <div class="los-section-title">Learning Outcome Statements</div>
        ${r.los.map(l => `
          <div class="los-item">
            <span class="los-code">${r.id}.${l.code}</span>
            <span>${l.text}</span>
          </div>`).join('')}
      </div>
      <div class="checklist-grid">
        <div class="checklist-group">
          <div class="cg-label">Study Activities</div>
          <div class="check-item">
            <input type="checkbox" id="lec-${r.id}" ${state.lectures?'checked':''} onchange="updateCheck(${r.id},'lectures',this.checked)">
            <label for="lec-${r.id}">🎬 Lectures Watched</label>
          </div>
          <div class="check-item">
            <input type="checkbox" id="read-${r.id}" ${state.reading?'checked':''} onchange="updateCheck(${r.id},'reading',this.checked)">
            <label for="read-${r.id}">📖 Reading Complete</label>
          </div>
        </div>
        <div class="checklist-group">
          <div class="cg-label">Practice Questions</div>
          <div class="check-item">
            <input type="checkbox" id="qb-${r.id}" ${state.qBooks?'checked':''} onchange="updateCheck(${r.id},'qBooks',this.checked)">
            <label for="qb-${r.id}">📚 SchweserNotes Questions</label>
          </div>
          <div class="check-item">
            <input type="checkbox" id="qo-${r.id}" ${state.qOfficial?'checked':''} onchange="updateCheck(${r.id},'qOfficial',this.checked)">
            <label for="qo-${r.id}">🏛 CFA Official EOC Qs</label>
          </div>
          <div class="check-item">
            <input type="checkbox" id="qt-${r.id}" ${state.qOther?'checked':''} onchange="updateCheck(${r.id},'qOther',this.checked)">
            <label for="qt-${r.id}">🔁 Mock / 3rd-Party Qs</label>
          </div>
        </div>
      </div>
      <div class="controls-row">
        <div class="ctrl-group">
          <label class="ctrl-label">Topic Confidence</label>
          <div class="confidence-stars" id="stars-${r.id}">
            ${[1,2,3,4,5].map(n=>`<button class="star-btn ${state.confidence>=n?'lit':''}" onclick="setConf(${r.id},${n})" title="${confLabels[n]}">⭐</button>`).join('')}
          </div>
          <div class="conf-labels"><span>Beginner</span><span>Expert</span></div>
          <div class="confidence-label" id="conf-lbl-${r.id}">${state.confidence>0?confLabels[state.confidence]:'Not rated'}</div>
        </div>
        <div class="ctrl-group">
          <label class="ctrl-label">1st Revision</label>
          <div class="rev-inner">
            <input type="date" id="rev1d-${r.id}" value="${state.rev1Date||''}" onchange="updateField(${r.id},'rev1Date',this.value)">
            <div class="status-toggle">
              <div class="status-btn ${state.rev1Status==='done'?'active-done':''}" onclick="setStatus(${r.id},'rev1Status','done')">✓ Done</div>
              <div class="status-btn ${state.rev1Status==='pending'?'active-pending':''}" onclick="setStatus(${r.id},'rev1Status','pending')">⏳ Pending</div>
            </div>
          </div>
        </div>
        <div class="ctrl-group">
          <label class="ctrl-label">2nd Revision</label>
          <div class="rev-inner">
            <input type="date" id="rev2d-${r.id}" value="${state.rev2Date||''}" onchange="updateField(${r.id},'rev2Date',this.value)">

// ══════════════════════════════════════════════════
// MAIN CONTENT RENDER
// ══════════════════════════════════════════════════
function renderMain() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '';
  CURRICULUM.forEach((subj, si) => {
    const sec = document.createElement('div');
    sec.className = 'subject-section';
    sec.id = `subj-${subj.id}`;
    sec.style.animationDelay = `${si * 0.06}s`;

    const { pct } = getSubjectProgress(subj);
    sec.innerHTML = `
      <div class="subject-header">
        <span class="subject-tag">${subj.bookLabel}</span>
        <h2 class="subject-title">${subj.subject}</h2>
        <span class="subject-count">${subj.readings.length} readings</span>
        <span class="subject-prog-text" id="subj-prog-${subj.id}">${pct}%</span>
      </div>`;

    subj.readings.forEach(r => {
      const card = renderChapterCard(r);
      sec.appendChild(card);
    });

    mc.appendChild(sec);
  });
}

// ══════════════════════════════════════════════════
// INTERACTION HANDLERS
// ══════════════════════════════════════════════════
function toggleCard(rid) {
  const card = document.getElementById(`ch-${rid}`);
  card.classList.toggle('expanded');
}

function updateCheck(rid, field, val) {
  getReadingState(APP_STATE, rid)[field] = val;
  refreshCard(rid);
  persist();
}

function updateField(rid, field, val) {
  getReadingState(APP_STATE, rid)[field] = val;
  persist();
}

function setConf(rid, n) {
  const s = getReadingState(APP_STATE, rid);
  s.confidence = (s.confidence === n) ? 0 : n;
  const confLabels = ['','Beginner','Developing','Moderate','Strong','Expert'];
  const container = document.getElementById(`stars-${rid}`);
  if (container) {
    container.querySelectorAll('.star-btn').forEach((btn, i) => {
      btn.classList.toggle('lit', i < s.confidence);
    });
  }
  const lbl = document.getElementById(`conf-lbl-${rid}`);
  if (lbl) lbl.textContent = s.confidence > 0 ? confLabels[s.confidence] : 'Not rated';
  refreshCard(rid);
  persist();
}

function setStatus(rid, field, val) {
  const s = getReadingState(APP_STATE, rid);
  s[field] = (s[field] === val) ? '' : val;
  const card = document.getElementById(`ch-${rid}`);
  if (card) {
    card.querySelectorAll('.status-btn').forEach(btn => {
      if (btn.textContent.includes('Done') && field.includes('rev1') || btn.textContent.includes('Done') && field.includes('rev2')) {
        // reset both in the right group
      }
    });
    // Re-render the controls row for status toggles
    const rev1Done = card.querySelector(`[onclick*="'${field}','done'"]`);
    const rev1Pend = card.querySelector(`[onclick*="'${field}','pending'"]`);
    if (rev1Done) { rev1Done.className = 'status-btn' + (s[field]==='done'?' active-done':''); }
    if (rev1Pend) { rev1Pend.className = 'status-btn' + (s[field]==='pending'?' active-pending':''); }
  }
  refreshCard(rid);
  persist();
}

function refreshCard(rid) {
  const sc = getReadingScore(rid);
  const pct = Math.round((sc / MAX_SCORE) * 100);
  const comp = getChapterCompletionLabel(rid);
  const fill = document.getElementById(`chpf-${rid}`);
  const compEl = document.getElementById(`chcomp-${rid}`);
  if (fill) fill.style.width = pct + '%';
  if (compEl) { compEl.className = `ch-completion ${comp.cls}`; compEl.textContent = comp.label; }

  // Update subject progress
  const subj = CURRICULUM.find(s => s.readings.some(r => r.id === rid));
  if (subj) {
    const { pct: sp } = getSubjectProgress(subj);
    const spEl = document.getElementById(`subj-prog-${subj.id}`);
    if (spEl) spEl.textContent = sp + '%';
  }
}

function updateNotes(rid, val) {
  getReadingState(APP_STATE, rid).notes = val;
  const charEl = document.getElementById(`notes-char-${rid}`);
  if (charEl) charEl.textContent = val.length + ' chars';
  persist();
}

// ══════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════
let toastTimer;
function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1600);
}

// ══════════════════════════════════════════════════
// SCROLL SPY
// ══════════════════════════════════════════════════
function initScrollSpy() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const rid = e.target.id.replace('ch-','');
        document.querySelectorAll('.sb-link').forEach(l => l.classList.remove('active'));
        const link = document.getElementById(`sb-${rid}`);
        if (link) { link.classList.add('active'); link.scrollIntoView({ block: 'nearest' }); }
      }
    });
  }, { threshold: 0.2, rootMargin: '-80px 0px -60% 0px' });

  CURRICULUM.forEach(s => s.readings.forEach(r => {
    const el = document.getElementById(`ch-${r.id}`);
    if (el) observer.observe(el);
  }));
}

  renderSidebar();
  renderMain();
  updateGlobalStats();
  updateAllSidebarRings();
  initScrollSpy();
});
